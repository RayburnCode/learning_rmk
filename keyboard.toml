[keyboard]
name = "Mad Mod Labs 68"
vendor_id = 0x4c4b
product_id = 0x4643
manufacturer = "Mad Mod Labs"
chip = "rp2040"

[matrix]
rows = 5
cols = 15
io_type = "col2row"
matrix_type = "normal"

row_pins = ["PIN_0", "PIN_1", "PIN_2", "PIN_3", "PIN_4"]
col_pins = [
    "PIN_5", "PIN_6", "PIN_7", "PIN_8", "PIN_9",
    "PIN_10", "PIN_11", "PIN_12", "PIN_13", "PIN_14",
    "PIN_15", "PIN_16", "PIN_17", "PIN_18", "PIN_19"
]

[layout]
rows = 5
cols = 15
layers = 1

keymap = [
    [
        # Row 0: cols 0-14 (all 15 sequential)
        ["Escape", "Kc1", "Kc2", "Kc3", "Kc4", "Kc5", "Kc6", "Kc7", "Kc8", "Kc9", "Kc0", "Minus", "Equal", "Backspace", "Grave"],

        # Row 1: cols 0-14 (all 15 sequential)
        ["Tab", "Q", "W", "E", "R", "T", "Y", "U", "I", "O", "P", "LeftBracket", "RightBracket", "Backslash", "PageUp"],

        # Row 2: cols 0-11, SKIP 12 (Enter is wide, occupies 12+13), Enter=col13, PgDn=col14
        ["CapsLock", "A", "S", "D", "F", "G", "H", "J", "K", "L", "Semicolon", "Quote", "__", "Enter", "PageDown"],

        # Row 3: LShift=col0 (wide, occupies 0+1), SKIP col1, Z-/=cols2-10, SKIP col11 (RShift wide occupies 11+12), RShift=col12, Up=col13, Del=col14
        ["LShift", "__", "Z", "X", "C", "V", "B", "N", "M", "Comma", "Dot", "Slash", "RShift", "Up", "Delete"],

        # Row 4: LCtrl=0, Win=1, Alt=2, SKIP 3+4 (Space is wide, starts col5), Space=5, SKIP 6+7+8, RAlt=9, Fn=10, RCtrl=11, Left=12, Down=13, Right=14
        ["LCtrl", "LGui", "LAlt", "__", "__", "Space", "__", "__", "__", "RAlt", "Fn", "RCtrl", "Left", "Down", "Right"]
    ]
]