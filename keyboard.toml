[keyboard]
name = "Mad Mod Labs 68"
vendor_id = 0x4c4b
product_id = 0x4643
manufacturer = "Mad Mod Labs"
chip = "rp2040"

[matrix]
rows = 5
cols = 15
io_type = "col2row"
matrix_type = "normal"

row_pins = ["PIN_0", "PIN_1", "PIN_2", "PIN_3", "PIN_4"]
col_pins = [
    "PIN_5", "PIN_6", "PIN_7", "PIN_8", "PIN_9",
    "PIN_10", "PIN_11", "PIN_12", "PIN_13", "PIN_14",
    "PIN_15", "PIN_16", "PIN_17", "PIN_18", "PIN_19"
]

[layout]
rows = 5
cols = 15
layers = 1

keymap = [
    [
        # Row 0: Esc, 1-0, -, =, Backspace(wide=2 cols), `  → 15 cols
        ["Escape", "Kc1", "Kc2", "Kc3", "Kc4", "Kc5", "Kc6", "Kc7", "Kc8", "Kc9", "Kc0", "Minus", "Equal", "Backspace", "Grave"],

        # Row 1: Tab(1.5), Q-P, [, ], \(1.5), PgUp  → 15 cols
        ["Tab", "Q", "W", "E", "R", "T", "Y", "U", "I", "O", "P", "LeftBracket", "RightBracket", "Backslash", "PageUp"],

        # Row 2: CapsLock(1.75), A-L, ;, ', Enter(2.25), PgDn  → 14 physical keys
        # CapsLock is wide, Enter is wide — so one fewer key. Pad with __ at end
        ["CapsLock", "A", "S", "D", "F", "G", "H", "J", "K", "L", "Semicolon", "Quote", "Enter", "PageDown", "__"],

        # Row 3: Shift(2.25), Z-/, Shift(1.75), Up, Del → 13 physical keys, pad 2
        ["LShift", "Z", "X", "C", "V", "B", "N", "M", "Comma", "Dot", "Slash", "RShift", "Up", "Delete", "__"],

        # Row 4: Ctrl(1.25), Win(1.25), Alt(1.25), Space(6.25), Alt, Fn, Ctrl, ←, ↓, →  → 10 physical keys, pad 5
        ["LCtrl", "LGui", "LAlt", "Space", "RAlt", "Fn", "RCtrl", "Left", "Down", "Right", "__", "__", "__", "__", "__"]
    ]
]